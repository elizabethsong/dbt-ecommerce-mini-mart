version: 2

models:
  - name: stg_customers
    description: "Cleaned customer seed data."
    columns:
      - name: customer_id
        description: "Primary key for customers."
        tests: [not_null, unique]

  - name: stg_orders
    description: "Cleaned order seed data."
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

  - name: stg_payments
    description: "Cleaned payment seed data."
    columns:
      - name: payment_id
        tests: [not_null, unique]
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

  - name: fct_orders
    description: "Order fact table with payment rollups."
    columns:
      - name: order_id
        tests: [not_null, unique]

  - name: dim_customers
    description: "Customer dimension with rollups (LTV, order count)."
    columns:
      - name: customer_id
        tests: [not_null, unique]