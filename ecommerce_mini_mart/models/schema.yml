version: 2

models:
  - name: stg_customers
    description: "Standardized customer dimension sourced from raw mock ecommerce data. Cleaned customer seed data and prepares for downstream modeling."
    columns:
      - name: customer_id
        description: "Primary key for customers."
        tests: [not_null, unique]

  - name: stg_orders
    description: "Cleaned order-level dataset with standardized statuses and monetary fields."
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

  - name: stg_payments
    description: "Standardized payment records at the transaction level."
    columns:
      - name: payment_id
        tests: [not_null, unique]
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

  - name: fct_orders
    description: "Order level fact table with aggregated payment metrics."
    columns:
      - name: order_id
        tests: [not_null, unique]

  - name: dim_customers
    description: "Customer dimension with rollups (LTV, order count)."
    columns:
      - name: customer_id
        tests: [not_null, unique]