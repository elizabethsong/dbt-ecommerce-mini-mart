name: Publish dbt docs to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-duckdb

      - name: Prepare dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          ecommerce_mini_mart:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: ./ecommerce.duckdb
          EOF

      - name: dbt deps (optional)
        run: dbt deps
        working-directory: ecommerce_mini_mart

      - name: dbt seed + build + docs
        run: |
          dbt seed
          dbt build
          dbt docs generate
        working-directory: ecommerce_mini_mart

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ecommerce_mini_mart/target

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
